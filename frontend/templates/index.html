<!DOCTYPE html>
<html lang="en" xml:lang="en">
<head>
<title>Smart Data Quality Analyzer</title>
<meta charset="utf-8" />

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f3f4f6;
    padding: 40px;
    color: #1f2937;
}

.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

h1 {
    text-align: center;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-right: 10px;
}

button:hover {
    background: #1d4ed8;
}

.metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-top: 20px;
}

.card {
    background: #f9fafb;
    padding: 15px;
    border-radius: 8px;
    text-align: center;
}

.value {
    font-size: 22px;
    font-weight: bold;
}

.history-card {
    background:#eef2ff;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
}

#errorBox {
    margin-top: 20px;
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <h1>Data Quality Analyzer</h1>

    <input type="file" id="fileInput">
    <br>

    <button onclick="uploadFile()">Analyze</button>
    <button onclick="document.getElementById('fileInput').click()">Edit File</button>

    <div id="fileName"></div>
    <div id="errorBox"></div>
    <div id="result"></div>

    <h2>Previous Files</h2>
    <div id="history"></div>

</div>

<script>
function saveHistory(result, fileName) {
    let history = JSON.parse(localStorage.getItem("history")) || [];

    history.push({
        fileName: fileName,
        result: result,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();
}

function loadHistory() {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    let html = "";

    history.forEach((item, index) => {
        html += `
        <div class="history-card">
            <b>${item.fileName}</b><br>
            Rows: ${item.result.rows ?? 0} |
            Missing: ${item.result.missing ?? 0} |
            Valid: ${item.result.valid ?? 0} |
            Invalid: ${item.result.invalid ?? 0}<br>
            ${item.time}
            <br>
            <button onclick="deleteHistory(${index})">Remove</button>
        </div>`;
    });

    document.getElementById("history").innerHTML = html;
}

function deleteHistory(index) {
    let history = JSON.parse(localStorage.getItem("history")) || [];
    history.splice(index, 1);
    localStorage.setItem("history", JSON.stringify(history));
    loadHistory();
}

async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];
    const resultBox = document.getElementById("result");
    const errorBox = document.getElementById("errorBox");

    resultBox.innerHTML = "";
    errorBox.innerHTML = "";

    if (!file) {
        alert("Upload file");
        return;
    }

    document.getElementById("fileName").innerText = "Uploaded: " + file.name;

    try {
        const text = await file.text();

        const res = await fetch("https://1eqilitcmb.execute-api.us-east-1.amazonaws.com/prod/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ data: text })
        });

        const result = await res.json();
        console.log("API RESULT:", result);

        if (!res.ok) {
            errorBox.innerText = result.error || "Something went wrong.";
            return;
        }

        saveHistory(result, file.name);

        let html = `
        <div class="metrics">
            <div class="card"><div class="value">${result.rows ?? 0}</div>Rows</div>
            <div class="card"><div class="value">${result.missing ?? 0}</div>Missing</div>
            <div class="card"><div class="value">${result.valid ?? 0}</div>Valid</div>
            <div class="card"><div class="value">${result.invalid ?? 0}</div>Invalid</div>
        </div>
        `;

        if (result.converted_times && result.converted_times.length > 0) {
            html += "<h3>Converted Times</h3>";

            result.converted_times.forEach(t => {
                html += `<div>${JSON.stringify(t)}</div>`;
            });
        }

        resultBox.innerHTML = html;

    } catch (err) {
        console.error("UPLOAD ERROR:", err);
        errorBox.innerText = "Error analyzing file.";
    }
}

window.onload = loadHistory;
</script>

</body>
</html>
